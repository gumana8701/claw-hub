<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1122"/>
      <stop offset="100%" style="stop-color:#050A1A"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Outer glow -->
  <circle cx="256" cy="240" r="160" fill="url(#glow)"/>
  <!-- Lightning bolt / Claw mark -->
  <path d="M290 80 L210 240 L270 240 L220 432 L340 220 L275 220 L330 80 Z" 
        fill="url(#bolt)" 
        stroke="rgba(255,255,255,0.1)" 
        stroke-width="2"/>
  <!-- Small accent marks (claw scratches) -->
  <path d="M155 160 L175 220" stroke="#3B82F6" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <path d="M145 190 L165 250" stroke="#7C3AED" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <path d="M355 280 L335 340" stroke="#8B5CF6" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <path d="M365 310 L345 370" stroke="#3B82F6" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
</svg>
